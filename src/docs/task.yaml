openapi: 3.0.0
info:
  title: Task API
  version: 1.0.0
  description: Task endpoints for Task Management
paths:
  /tasks:
    get:
      summary: Get all tasks
      tags: [Tasks]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Server error
    post:
      summary: Create a new task (admin/member)
      tags: [Tasks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  example: Write documentation
                description:
                  type: string
                  example: Complete the API docs for tasks
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Title is required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Server error
  /tasks/{id}:
    get:
      summary: Get a single task
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Task not found
        '500':
          description: Server error
    put:
      summary: Update a task
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Update docs
                description:
                  type: string
                  example: Revise the API documentation
                status:
                  type: string
                  enum: [pending, in_progress, completed]
                  example: completed
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Task not found
        '500':
          description: Server error
    delete:
      summary: Delete a task (admin only)
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Task deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Task not found
        '500':
          description: Server error
components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: string
          example: task-uuid
        title:
          type: string
          example: Write documentation
        description:
          type: string
          example: Complete the API docs for tasks
        user_id:
          type: string
          example: user-uuid
        status:
          type: string
          enum: [pending, in_progress, completed]
          example: pending
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
