openapi: 3.0.0
info:
  title: Project API
  version: 1.0.0
  description: Project endpoints for Task Management
paths:
  /projects:
    get:
      summary: Get all projects (admin only)
      tags: [Projects]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Server error
    post:
      summary: Create a new project (admin only)
      tags: [Projects]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Website Redesign
                description:
                  type: string
                  example: Redesign the company website
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Project name is required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Server error
  /projects/{id}:
    get:
      summary: Get a project by ID (admin only)
      tags: [Projects]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found
        '500':
          description: Server error
    put:
      summary: Update a project (admin only)
      tags: [Projects]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Project ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Website Redesign
                description:
                  type: string
                  example: Updated description
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found
        '500':
          description: Server error
    delete:
      summary: Delete a project (admin only)
      tags: [Projects]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        '204':
          description: Project deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found
        '500':
          description: Server error
components:
  schemas:
    Project:
      type: object
      properties:
        id:
          type: string
          example: project-uuid
        name:
          type: string
          example: Website Redesign
        description:
          type: string
          example: Redesign the company website
        created_by:
          type: string
          example: user-uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
